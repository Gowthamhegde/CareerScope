services:
  # Backend API Service
  - type: web
    name: salarypredictor-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false  # Set this manually in Render dashboard for security
      - key: FRONTEND_URL
        sync: false  # Set this to your Vercel frontend URL
